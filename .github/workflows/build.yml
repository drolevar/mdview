name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  # Opt JS-based actions into Node.js 24 ahead of GitHub's
  # 2026-06-02 forced upgrade (Node 20 deprecation).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  windows-x64-debug:
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add MSVC to PATH
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: viewer/package-lock.json

      - name: Install renderer deps
        working-directory: viewer
        run: npm ci

      - name: Bootstrap vcpkg
        shell: pwsh
        run: .\external\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/windows-msvc-x64-debug/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Configure
        run: cmake --preset windows-msvc-x64-debug

      - name: Build
        run: cmake --build --preset windows-msvc-x64-debug

      - name: Test
        run: ctest --preset windows-msvc-x64-debug

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdview-wlx64-debug
          path: |
            build/windows-msvc-x64-debug/src/mdview.wlx64
            viewer/index.html
            viewer/styles.css
            viewer/dist/
          if-no-files-found: error
