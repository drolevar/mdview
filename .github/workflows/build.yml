name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: build-${{ matrix.arch }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Add MSVC to PATH
        # Fork of step-security/msvc-dev-cmd with validateSubscription()
        # stripped so the action runs on this private repo. Revert to
        # step-security/msvc-dev-cmd@v1 once mdview is public.
        uses: drolevar/msvc-dev-cmd@42a75f472a092656b3978a23e6719e068f5f02d4
        with:
          arch: ${{ matrix.arch }}
          # Pin MSVC to 14.44 (last Win7-capable STL; 14.50
          # unconditionally imports Win8 APIs). Matches the
          # overlay triplet and dev-env.ps1.
          toolset: '14.44'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: viewer/package-lock.json

      - name: Install renderer deps
        working-directory: viewer
        run: npm ci

      - name: Fingerprint vcpkg tool
        id: vcpkg
        shell: pwsh
        run: |
          $h = (Get-FileHash "$env:VCPKG_ROOT\vcpkg.exe" -Algorithm SHA256).Hash.Substring(0, 16)
          "fingerprint=$h" >> $env:GITHUB_OUTPUT

      # Independent per-config caches: the debug and release
      # vcpkg_installed trees are cached under separate keys so a
      # run where only one tree exists (e.g. the integration gate
      # fails before the release build) can never poison a shared
      # key and silently force from-source rebuilds on later runs.
      - name: Cache vcpkg installed (debug)
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/build/windows-msvc-${{ matrix.arch }}-debug/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ matrix.arch }}-debug-${{ steps.vcpkg.outputs.fingerprint }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json', 'triplets/x64-windows-static.cmake', 'triplets/x86-windows-static.cmake') }}

      - name: Cache vcpkg installed (release)
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/build/windows-msvc-${{ matrix.arch }}-release/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ matrix.arch }}-release-${{ steps.vcpkg.outputs.fingerprint }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json', 'triplets/x64-windows-static.cmake', 'triplets/x86-windows-static.cmake') }}

      - name: Configure (debug)
        run: cmake --preset windows-msvc-${{ matrix.arch }}-debug

      - name: Build (debug)
        run: cmake --build --preset windows-msvc-${{ matrix.arch }}-debug

      - name: Run unit tests
        run: ctest --preset windows-msvc-${{ matrix.arch }}-debug --label-exclude integration --output-on-failure

      - name: Run integration tests
        env:
          MDVIEW_HARNESS_HIDDEN: '1'
          MDVIEW_SMOKE_DIR: ${{ github.workspace }}/tests/smoke
        run: ctest --preset windows-msvc-${{ matrix.arch }}-debug --label-regex "^integration$" --output-on-failure

      - name: Upload integration logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-logs-${{ matrix.arch }}
          path: |
            build/windows-msvc-${{ matrix.arch }}-debug/tests/integration/screenshots/
            build/windows-msvc-${{ matrix.arch }}-debug/Testing/

      - name: Build production viewer bundle
        working-directory: viewer
        env:
          NODE_ENV: production
        run: node build.mjs

      - name: Bundle size budget
        shell: pwsh
        run: |
          $entry = "viewer/dist/app.js"
          if (-not (Test-Path $entry)) {
            Write-Error "viewer/dist/app.js missing"
            exit 1
          }
          $size = (Get-Item $entry).Length
          $kb   = [math]::Round($size / 1024, 1)
          Write-Host "viewer entry: $kb KB"
          if ($size -gt 400 * 1024) {
            Write-Error "viewer entry exceeds 400 KB budget ($kb KB)"
            exit 1
          }
          # .js only -- production esbuild emits linked .js.map
          # sourcemaps too, but those are NOT shipped: the WLX
          # RCDATA generator excludes them (GenerateViewerResources
          # .cmake: FILTER EXCLUDE REGEX "\.map$"). Gating their
          # size here would fail on the ~4x-larger sourcemaps for
          # no real reason.
          $chunks = Get-ChildItem viewer/dist/chunks -Filter *.js -ErrorAction SilentlyContinue
          foreach ($c in $chunks) {
            $ckb = [math]::Round($c.Length / 1024, 1)
            Write-Host "chunk: $($c.Name) = $ckb KB"
            if ($c.Name -match "mermaid" -and $c.Length -gt 3 * 1024 * 1024) {
              Write-Error "mermaid chunk exceeds 3 MB sanity cap ($ckb KB)"
              exit 1
            }
            if ($c.Name -match "math-chunk" -and $c.Length -gt 1 * 1024 * 1024) {
              Write-Error "math chunk exceeds 1 MB sanity cap ($ckb KB)"
              exit 1
            }
            if ($c.Name -match "^chunk-" -and $c.Length -gt 1536 * 1024) {
              Write-Error "shared chunk exceeds 1.5 MB sanity cap ($ckb KB)"
              exit 1
            }
          }

      - name: Configure (release)
        run: cmake --preset windows-msvc-${{ matrix.arch }}-release

      - name: Build (release)
        run: cmake --build --preset windows-msvc-${{ matrix.arch }}-release

      - name: Assert no VC++ redist dependency (release)
        shell: pwsh
        run: |
          $wlx = (Get-ChildItem "build/windows-msvc-${{ matrix.arch }}-release/src/mdview.wlx*" | Select-Object -First 1).FullName
          ./tools/check-no-redist.ps1 -Binary $wlx

      - name: Assert Win7 import floor (release)
        shell: pwsh
        run: |
          $wlx = (Get-ChildItem "build/windows-msvc-${{ matrix.arch }}-release/src/mdview.wlx*" | Select-Object -First 1).FullName
          ./tools/check-win7-imports.ps1 -Binary $wlx

      - name: Stage release WLX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force pkg-stage | Out-Null
          Copy-Item "build/windows-msvc-${{ matrix.arch }}-release/src/mdview.wlx*" pkg-stage/ -Force
          Get-ChildItem pkg-stage

      - name: Upload release WLX artifact
        uses: actions/upload-artifact@v7
        with:
          name: mdview-${{ matrix.arch }}-release
          path: pkg-stage/mdview.wlx*
          if-no-files-found: error

  package:
    name: package
    needs: [build]
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download x64 release artifact
        uses: actions/download-artifact@v7
        with:
          name: mdview-x64-release
          path: artifacts/x64

      - name: Download x86 release artifact
        uses: actions/download-artifact@v7
        with:
          name: mdview-x86-release
          path: artifacts/x86

      # Cache the pinned UPX zip keyed by its immutable version+SHA
      # so the third-party releases-CDN fetch happens once, not every
      # run (removes a transient-network spurious-red on the release
      # packaging job). The key changes only if the pin changes.
      - name: Cache UPX
        uses: actions/cache@v5
        with:
          path: upx-dl
          key: upx-5.1.1-win64-fa5380bca4c2718547aaa0134bc0d8a7fa27e102f0ac6371573d60d1c21d64de

      - name: Provision UPX (pinned, SHA256-verified)
        shell: pwsh
        run: |
          $ver  = '5.1.1'
          $zip  = "upx-$ver-win64.zip"
          $url  = "https://github.com/upx/upx/releases/download/v$ver/$zip"
          $want = 'fa5380bca4c2718547aaa0134bc0d8a7fa27e102f0ac6371573d60d1c21d64de'
          New-Item -ItemType Directory -Force upx-dl | Out-Null
          $zipPath = "upx-dl/$zip"
          if (-not (Test-Path $zipPath)) {
            Invoke-WebRequest -Uri $url -OutFile $zipPath
          }
          # Always verify — whether freshly downloaded or cache-restored
          # (defends against a corrupted/poisoned cache too).
          $got = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLower()
          if ($got -ne $want) {
            Write-Error "UPX sha256 mismatch: got $got want $want"
            exit 1
          }
          Expand-Archive $zipPath -DestinationPath upx -Force
          $exe = (Get-ChildItem upx -Recurse -Filter upx.exe | Select-Object -First 1).FullName
          "UPX_EXECUTABLE=$exe" >> $env:GITHUB_ENV
          & $exe --version

      - name: Build combined package
        id: pkg
        shell: pwsh
        run: |
          $zip = & ./tools/package-release.ps1 `
            -Wlx64 artifacts/x64/mdview.wlx64 `
            -Wlx32 artifacts/x86/mdview.wlx `
            -OutDir dist
          if (-not $zip -or -not (Test-Path -LiteralPath $zip)) {
            Write-Error "packager did not produce a zip"
            exit 1
          }
          "zip=$zip" >> $env:GITHUB_OUTPUT
          Write-Host "Built $zip"

      - name: Upload combined zip
        uses: actions/upload-artifact@v7
        with:
          name: mdview-combined-zip
          path: dist/mdview-*.zip
          if-no-files-found: error

  # Tag-only: assemble a DRAFT GitHub Release from the CI-built
  # combined zip. A human flips it public (draft-hybrid). Inert on
  # branch/PR pushes (build + package still run there); fires only
  # on a v* tag.
  release:
    name: release (draft)
    needs: [package]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download combined zip
        uses: actions/download-artifact@v7
        with:
          name: mdview-combined-zip
          path: dist

      - name: Create or update DRAFT release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          zip=$(ls dist/mdview-*.zip)
          title="$tag — cross-arch combined package"
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$tag" "$zip" --repo "${{ github.repository }}" --clobber
            gh release edit "$tag" --repo "${{ github.repository }}" --draft \
              --title "$title" --notes-file .github/RELEASE_NOTES.md
          else
            gh release create "$tag" "$zip" --repo "${{ github.repository }}" --draft \
              --title "$title" --notes-file .github/RELEASE_NOTES.md
          fi
