name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  windows-x64-debug:
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Add MSVC to PATH
        # Fork of step-security/msvc-dev-cmd with validateSubscription()
        # stripped so the action runs on this private repo. Revert to
        # step-security/msvc-dev-cmd@v1 once mdview is public.
        uses: drolevar/msvc-dev-cmd@42a75f472a092656b3978a23e6719e068f5f02d4
        with:
          arch: x64

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: viewer/package-lock.json

      - name: Install renderer deps
        working-directory: viewer
        run: npm ci

      # Fingerprint vcpkg.exe so a runner-image bump that changes the
      # bundled vcpkg tool invalidates the cache key. Without this the
      # key only encodes the manifest; a tool change makes the cached
      # ABI hashes stale, vcpkg discards the restored tree and rebuilds
      # from source, and actions/cache refuses to overwrite the existing
      # key on save — so the freshly-built contents are dropped and the
      # next run repeats the same waste indefinitely.
      - name: Fingerprint vcpkg tool
        id: vcpkg
        shell: pwsh
        run: |
          $h = (Get-FileHash "$env:VCPKG_ROOT\vcpkg.exe" -Algorithm SHA256).Hash.Substring(0, 16)
          "fingerprint=$h" >> $env:GITHUB_OUTPUT

      - name: Cache vcpkg installed
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/build/windows-msvc-x64-debug/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ steps.vcpkg.outputs.fingerprint }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Configure
        run: cmake --preset windows-msvc-x64-debug

      - name: Build
        run: cmake --build --preset windows-msvc-x64-debug

      - name: Run unit tests
        run: ctest --preset windows-msvc-x64-debug --label-exclude integration --output-on-failure

      - name: Run integration tests
        env:
          MDVIEW_HARNESS_HIDDEN: '1'
          MDVIEW_SMOKE_DIR: ${{ github.workspace }}/tests/smoke
        run: ctest --preset windows-msvc-x64-debug --label-regex "^integration$" --output-on-failure

      - name: Upload integration logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-logs
          path: |
            build/windows-msvc-x64-debug/tests/integration/screenshots/
            build/windows-msvc-x64-debug/Testing/

      - name: Build production viewer bundle
        working-directory: viewer
        env:
          NODE_ENV: production
        run: node build.mjs

      - name: Bundle size budget
        shell: pwsh
        run: |
          $entry = "viewer/dist/app.js"
          if (-not (Test-Path $entry)) {
            Write-Error "viewer/dist/app.js missing"
            exit 1
          }
          $size = (Get-Item $entry).Length
          $kb   = [math]::Round($size / 1024, 1)
          Write-Host "viewer entry: $kb KB"
          if ($size -gt 400 * 1024) {
            Write-Error "viewer entry exceeds 400 KB budget ($kb KB)"
            exit 1
          }
          $chunks = Get-ChildItem viewer/dist/chunks -ErrorAction SilentlyContinue
          foreach ($c in $chunks) {
            $ckb = [math]::Round($c.Length / 1024, 1)
            Write-Host "chunk: $($c.Name) = $ckb KB"
            if ($c.Name -match "mermaid" -and $c.Length -gt 3 * 1024 * 1024) {
              Write-Error "mermaid chunk exceeds 3 MB sanity cap ($ckb KB)"
              exit 1
            }
            if ($c.Name -match "math-chunk" -and $c.Length -gt 1 * 1024 * 1024) {
              Write-Error "math chunk exceeds 1 MB sanity cap ($ckb KB)"
              exit 1
            }
            if ($c.Name -match "^chunk-" -and $c.Length -gt 1536 * 1024) {
              Write-Error "shared chunk exceeds 1.5 MB sanity cap ($ckb KB)"
              exit 1
            }
          }

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: mdview-wlx64-debug
          path: |
            build/windows-msvc-x64-debug/src/mdview.wlx64
            viewer/index.html
            viewer/styles.css
            viewer/styles/
            viewer/dist/
          if-no-files-found: error
