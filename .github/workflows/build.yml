name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  windows-x64-debug:
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add MSVC to PATH
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Bootstrap vcpkg
        shell: pwsh
        run: .\external\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/windows-msvc-x64-debug/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Configure
        run: cmake --preset windows-msvc-x64-debug

      - name: Build
        run: cmake --build --preset windows-msvc-x64-debug

      - name: Test
        run: ctest --preset windows-msvc-x64-debug

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdview-wlx64-debug
          path: build/windows-msvc-x64-debug/src/mdview.wlx64
          if-no-files-found: error
